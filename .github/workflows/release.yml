name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (for example v0.0.2)"
        required: true
        type: string

env:
  RUST_BACKTRACE: short
  HUSKY: 0

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-draft-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_url: ${{ steps.release.outputs.release_url }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      release_body: ${{ steps.release.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: .release-workflow
          sparse-checkout: .github/scripts/release
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - id: resolve
        name: Validate tag and project versions
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: bash .release-workflow/.github/scripts/release/resolve-release.sh

      - name: Validate signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash .release-workflow/.github/scripts/release/validate-secrets.sh

      - id: release
        name: Create or reuse draft release
        uses: actions/github-script@v7
        env:
          PRERELEASE: ${{ steps.resolve.outputs.prerelease }}
        with:
          script: |
            const createOrReuseDraft = require(
              "./.release-workflow/.github/scripts/release/create-draft-release.cjs"
            );
            await createOrReuseDraft({
              github,
              context,
              core,
              tag: process.env.RELEASE_TAG,
              prerelease: process.env.PRERELEASE === "true",
            });

  build-tauri:
    needs: create-draft-release
    permissions:
      contents: write
    uses: ./.github/workflows/release-tauri.yml
    with:
      release_id: ${{ needs.create-draft-release.outputs.release_id }}
      release_tag: ${{ needs.create-draft-release.outputs.release_tag }}
      release_body: ${{ needs.create-draft-release.outputs.release_body }}
      prerelease: ${{ needs.create-draft-release.outputs.prerelease == 'true' }}
    secrets: inherit

  build-server:
    needs: create-draft-release
    permissions:
      contents: write
    uses: ./.github/workflows/release-server.yml
    with:
      release_tag: ${{ needs.create-draft-release.outputs.release_tag }}
    secrets: inherit

  publish-release:
    needs:
      - create-draft-release
      - build-tauri
      - build-server
    if: ${{ needs.build-tauri.result == 'success' && needs.build-server.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-draft-release.outputs.release_id }}
          PRERELEASE: ${{ needs.create-draft-release.outputs.prerelease }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const prerelease = process.env.PRERELEASE === "true";

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              draft: false,
              prerelease,
            });

            core.info(`Published release #${releaseId}`);
